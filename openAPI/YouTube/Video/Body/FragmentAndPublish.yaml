type: object
required:
  - local_path
  - base_title
  - base_description
properties:
  local_path:
    type: string
    description: Absolute path to the local video file
    example: '/storage/videos/my-video.mp4'
  base_title:
    type: string
    description: Base title used for each published fragment
    example: 'My Video Tutorial'
  base_description:
    type: string
    description: Base description used for each published fragment
    example: 'Part of my video series'
  segment_duration_seconds:
    type: integer
    minimum: 1
    default: 60
    description: Duration of each fragment in seconds
    example: 60
