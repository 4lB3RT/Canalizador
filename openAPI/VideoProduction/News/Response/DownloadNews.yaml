type: array
items:
  type: object
  properties:
    id:
      type: string
      example: 'news_abc123'
    title:
      type: string
      example: 'Breaking news title'
    content:
      type: string
      example: 'Full news content...'
    source:
      type: string
      example: 'Reuters'
    published_at:
      type: string
      format: date-time
      example: '2026-03-26T10:00:00Z'
