services:
  nginx_canalizador:
    image: nginx:latest
    container_name: nginx_$PROJECT_NAME
    ports:
      - "$NGINX_PORT:80"
    expose:
      - "$NGINX_PORT"
    volumes:
      - ../:/code
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      canalizador:
        ipv4_address: 10.7.0.5
  php_canalizador:
    build: ./php
    container_name: php_$PROJECT_NAME
    volumes:
      - ../:/code
      - ./php:/usr/local/etc/php
      - /tmp:/tmp
    ports:
      - "$PHP_PORT:9000"
    expose:
      - "$PHP_PORT"
    networks:
      canalizador:
        ipv4_address: 10.7.0.7
    depends_on:
      - mysql_canalizador
      - redis_canalizador
      - rabbitmq_canalizador
    dns:
        - 8.8.8.8
        - 8.8.4.4
  mysql_canalizador:
      image: mariadb:latest
      container_name: mysql_$PROJECT_NAME
      command: --default-authentication-plugin=mysql_native_password && mysqladmin -u root -p status
      restart: always
      ports:
          - "$MYSQL_PORT:3306"
      expose:
          - "$MYSQL_PORT"
      environment:
          - MYSQL_DATABASE=${MYSQL_DATABASE}
          - MYSQL_USER=${MYSQL_USER}
          - MYSQL_PASSWORD=${MYSQL_PASSWORD}
          - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD}
          - MYSQL_TCP_PORT:${MYSQL_PORT}
      healthcheck:
          test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
          interval: 10s
          timeout: 5s
          retries: 5
      networks:
          canalizador:
              ipv4_address: 10.7.0.6
  redis_canalizador:
      image: redis:latest
      container_name: redis_$PROJECT_NAME
      ports:
          - "$REDIS_PORT:80"
      expose:
          - "$REDIS_PORT"
      networks:
          canalizador:
              ipv4_address: 10.7.0.10
  rabbitmq_canalizador:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq_$PROJECT_NAME
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      canalizador:
        ipv4_address: 10.7.0.11
  worker_canalizador:
    build: ./php
    container_name: worker_$PROJECT_NAME
    volumes:
      - ../:/code
      - /tmp:/tmp
    depends_on:
      mysql_canalizador:
        condition: service_healthy
      rabbitmq_canalizador:
        condition: service_healthy
    restart: unless-stopped
    working_dir: /code
    command: sh -c "php artisan migrate --force && php artisan rabbitmq:setup && php artisan queue:work rabbitmq --queue=video.created,clip.created,clip.completed,video.all_clips_completed --tries=3 --timeout=300 --sleep=3"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      canalizador:
        ipv4_address: 10.7.0.12
volumes:
  rabbitmq_data:
networks:
  canalizador:
    driver: bridge
    ipam:
      config:
        - subnet: 10.7.0.0/16
          gateway: 10.7.0.1
