services:
  nginx_canalizador:
    image: nginx:latest
    container_name: nginx_$PROJECT_NAME
    ports:
      - "10.7.0.5:80:80"
    expose:
      - "80"
    volumes:
      - ../:/code
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      canalizador:
        ipv4_address: 10.7.0.5
  php_canalizador:
    build: ./php
    container_name: php_$PROJECT_NAME
    volumes:
      - ../:/code
      - ./php:/usr/local/etc/php
      - /tmp:/tmp
    ports:
      - "10.7.0.7:9000:9000"
    expose:
      - "9000"
    networks:
      canalizador:
        ipv4_address: 10.7.0.7
    depends_on:
      - mysql_canalizador
  mysql_canalizador:
      image: mariadb:latest
      container_name: mysql_$PROJECT_NAME
      command: --default-authentication-plugin=mysql_native_password && mysqladmin -u root -p status
      restart: always
      ports:
          - "10.7.0.6:$MYSQL_PORT:3306"
      expose:
          - "$MYSQL_PORT"
      environment:
          - MYSQL_DATABASE=${MYSQL_DATABASE}
          - MYSQL_USER=${MYSQL_USER}
          - MYSQL_PASSWORD=${MYSQL_PASSWORD}
          - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD}
          - MYSQL_TCP_PORT:${MYSQL_PORT}
      networks:
          canalizador:
              ipv4_address: 10.7.0.6
networks:
  canalizador:
    driver: bridge
    ipam:
      config:
        - subnet: 10.7.0.0/16
          gateway: 10.7.0.1
